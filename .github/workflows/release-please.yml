name: release-please

# Drives the release process for every component in the monorepo.
# On each push to main, release-please reads the conventional-commit history,
# opens (or updates) one Release PR per component, and on merge of that PR
# creates the component's Git tag + GitHub Release. The per-component publish
# workflow (publish-npm.yml) hangs off those tags.
#
# Config lives at the repo root:
#   - release-please-config.json     (component declarations)
#   - .release-please-manifest.json  (last-released versions; source of truth)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

# A single group so concurrent pushes to main do not open competing Release PRs.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # IMPORTANT: a tag created with the default GITHUB_TOKEN does NOT raise
          # a `push: tags` event in other workflows (GitHub's "a workflow cannot
          # trigger another workflow" rule). Our publish-npm.yml triggers on tag
          # pushes, so release-please MUST create those tags with a Personal Access
          # Token (repo scope), stored as the RELEASE_PLEASE_TOKEN secret. Falls back
          # to GITHUB_TOKEN for opening PRs in forks / dry setups, in which case
          # publishing must be kicked off manually (see RELEASING.md).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # After release-please MERGES a Release PR it creates that component's tag +
      # GitHub Release (releases_created). Refresh the RELEASING.md status table on
      # main so its dates + tag links reflect the new release.
      #
      # The table is committed to MAIN — never to the open Release PR branches. The
      # previous approach pushed a `chore: refresh release status table` commit onto
      # each open Release PR branch; that foreign commit desynced release-please's
      # rebases when a sibling component released, dropped the `autorelease: pending`
      # label, and left merged Release PRs un-tagged (so the npm publish never fired).
      # Committing to main post-release keeps every Release PR branch a clean,
      # single-commit branch that release-please fully owns. The [skip ci] marker
      # stops this docs-only commit from re-triggering this workflow.
      - uses: actions/checkout@v5
        if: steps.release.outputs.releases_created == 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        if: steps.release.outputs.releases_created == 'true'
        with:
          node-version: 20

      - name: Refresh status table on main after release
        if: steps.release.outputs.releases_created == 'true'
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          node scripts/update-status-table.mjs
          if git diff --quiet -- RELEASING.md; then
            echo "no status-table change"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add RELEASING.md
            git commit -m "chore: refresh release status table [skip ci]"
            # Non-fatal: the release (tag + npm publish) already succeeded; a failed
            # docs push (e.g. main advanced) must not fail the run. The next release
            # refresh — or a local `node scripts/update-status-table.mjs` — corrects it.
            git push origin HEAD:main || \
              echo "::warning::status-table push to main skipped; refresh RELEASING.md manually"
          fi
